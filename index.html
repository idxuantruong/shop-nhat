<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ Nhật Xách Tay</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Shop Nhật</h1>

    <div class="product">
        <img src="img1.png" alt="Áo khoác">
        <h2>Áo khoác</h2>
        <p>Giá: 500000</p>
        <button onclick="buyProduct('Áo khoác')">Mua</button>
    </div>

    <div class="product">
        <img src="img2.png" alt="Giày Nike">
        <h2>Giày Nike</h2>
        <p>Giá: 2000000</p>
        <button onclick="buyProduct('Giày Nike')">Mua</button>
    </div>

    <div class="product">
        <img src="img3.png" alt="Túi xách">
        <h2>Túi xách</h2>
        <p>Giá: 1200000</p>
        <button onclick="buyProduct('Túi xách')">Mua</button>
    </div>

    <div class="product">
        <img src="img4.png" alt="Quần">
        <h2>Quần</h2>
        <p>Giá: 900000</p>
        <button onclick="buyProduct('Quần')">Mua</button>
    </div>

    <div class="product">
        <img src="img5.png" alt="Mũ">
        <h2>Mũ</h2>
        <p>Giá: 100000</p>
        <button onclick="buyProduct('Mũ')">Mua</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
